<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Register - Kerala Medicine Distributor App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; width: 100%; }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #4F46E5; font-size: 1.8em; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 25px; }
        .phone-input {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .phone-input:focus {
            outline: none;
            border-color: #4F46E5;
        }
        .btn { 
            background: #4F46E5; 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 10px;
            font-size: 1.2em; 
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        .btn:hover { background: #3730a3; }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover { color: #4F46E5; }
        .note {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            color: #555;
            font-size: 0.9em;
        }
        .whatsapp-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            font-size: 1.1em;
        }
        .whatsapp-btn:hover { background: #128C7E; }
        @media (max-width: 500px) {
            .card { padding: 25px; }
            h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📞 Quick Register</h1>
            <p class="subtitle">Enter your phone number. We will contact you to verify and list your business.</p>

            <input type="tel" class="phone-input" id="phoneInput" placeholder="+91 98765 43210" maxlength="15">
            <button class="btn" onclick="submitPhone()">Submit</button>

            <div class="note">
                <strong>Or WhatsApp us directly:</strong><br>
                Send your business name & location to our team<br><br>
                <a href="https://wa.me/919876543210?text=Hi%2C%20I%20want%20to%20register%20my%20pharmacy%20business%20on%20Kerala%20Medicine%20Distributor%20App" class="whatsapp-btn" target="_blank">💬 WhatsApp Register</a>
            </div>

            <a href="index.html" class="back-link">← Back to Search</a>
        </div>
    </div>

    <script>
        function submitPhone() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone || phone.length < 10) {
                alert('Please enter a valid phone number');
                return;
            }
            let registrations = JSON.parse(localStorage.getItem('registrations') || '[]');
            registrations.push({
                phone: phone,
                timestamp: new Date().toISOString(),
                status: 'pending'
            });
            localStorage.setItem('registrations', JSON.stringify(registrations));
            alert('Thank you! We will call you at ' + phone + ' within 24 hours to verify your business.');
            document.getElementById('phoneInput').value = '';
        }

        document.getElementById('phoneInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitPhone();
        });
    </script>
</body>
</html>
