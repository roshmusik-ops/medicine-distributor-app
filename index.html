<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrissur Distributors</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #4F46E5; font-size: 2.2em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1em; margin-bottom: 15px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-btn {
            background: white;
            border: 2px solid #4F46E5;
            color: #4F46E5;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #4F46E5;
            color: white;
        }
        .tab-btn:hover { transform: translateY(-2px); }
        .distributors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .distributor-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .distributor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .distributor-card h3 {
            color: #4F46E5;
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        .distributor-card p {
            color: #666;
            margin: 8px 0;
            font-size: 0.95em;
        }
        .phone {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }
        .badge {
            display: inline-block;
            background: #FFD700;
            color: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 10px;
        }
        .type {
            color: #888;
            font-size: 0.85em;
            margin-top: 8px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💊 Thrissur Distributors</h1>
            <p class="subtitle">Generic & Ethical Medicine Distributors</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('generic')">Generic (7)</button>
            <button class="tab-btn" onclick="showTab('ethical')">Ethical (21)</button>
        </div>

        <div id="generic" class="tab-content active">
            <div class="distributors-grid" id="generic-grid"></div>
        </div>

        <div id="ethical" class="tab-content">
            <div class="distributors-grid" id="ethical-grid"></div>
        </div>

        <footer>
            <p>© 2026 Thrissur Distributors | Real & Verified</p>
        </footer>
    </div>

    <script src="distributors.js"></script>
    <script>
        function showTab(type) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(type).classList.add('active');
            event.target.classList.add('active');
        }

        function renderDistributors() {
            const genericGrid = document.getElementById('generic-grid');
            const ethicalGrid = document.getElementById('ethical-grid');

            // Render generic distributors
            allDistributors.generic.forEach(dist => {
                const card = document.createElement('div');
                card.className = 'distributor-card';
                card.innerHTML = `
                    <h3>${dist.name}</h3>
                    <p class="phone">📞 ${dist.phone}</p>
                    <p class="type">${dist.type}</p>
                    ${dist.featured ? '<span class="badge">TOP DISTRIBUTOR</span>' : ''}
                `;
                genericGrid.appendChild(card);
            });

            // Render ethical distributors
            allDistributors.ethical.forEach(dist => {
                const card = document.createElement('div');
                card.className = 'distributor-card';
                card.innerHTML = `
                    <h3>${dist.name}</h3>
                    <p class="phone">📞 ${dist.phone}</p>
                    <p class="type">${dist.type}</p>
                    ${dist.featured ? '<span class="badge">TOP DISTRIBUTOR</span>' : ''}
                `;
                ethicalGrid.appendChild(card);
            });
        }

        // Render on load
        renderDistributors();
    </script>
</body>
</html>
