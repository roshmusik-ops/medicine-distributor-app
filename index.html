<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Distributor - Kerala</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #4F46E5; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.1em; }
        .search-box { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .search-input { 
            width: 100%; 
            padding: 15px; 
            font-size: 1.1em; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .search-input:focus { outline: none; border-color: #4F46E5; }
        .btn { 
            background: #4F46E5; 
            color: white; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 10px;
            font-size: 1.1em; 
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #3730a3; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { color: #1a1a1a; margin-bottom: 15px; font-size: 1.3em; }
        .card p { color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .card a { color: #4F46E5; text-decoration: none; }
        .card a:hover { text-decoration: underline; }
        .badge { 
            display: inline-block; 
            background: #4F46E5; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 20px;
            font-size: 0.85em; 
            margin-top: 15px;
        }
        .footer { 
            text-align: center; 
            color: white; 
            padding: 40px; 
            margin-top: 50px;
            opacity: 0.9;
        }
        .hidden { display: none; }
        #count { color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💊 Medicine Distributor</h1>
            <p class="subtitle">Find medicine distributors in Kerala - Free & Unlimited Search</p>
        </header>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by distributor name or location...">
            <button class="btn" onclick="search()">Search</button>
            <p id="count"></p>
        </div>

        <div class="results" id="results"></div>

        <div class="footer">
            <p>© 2026 Medicine Distributor App | Free for all Kerala distributors</p>
        </div>
    </div>

    <script src="medicines_data.js"></script>
    <script>
        // Distributor details lookup

            "Cochin Medical Supplies": { location: "Ernakulam", phone: "+91 98095 67890", type: "Medical Supplies" },
            "Malabar Pharma Hub": { location: "Malappuram", phone: "+91 99123 45678", type: "Wholesale" },
            "Palakkad Medical Stores": { location: "Palakkad", phone: "+91 99678 90123", type: "Retail" },
            "Kannur Pharma Center": { location: "Kannur", phone: "+91 99876 54321", type: "Distributor" },
            "Kottayam Medicine Mart": { location: "Kottayam", phone: "+91 98345 67890", type: "Retail" },
            "Alappuzha Medical Agency": { location: "Alappuzha", phone: "+91 99456 78901", type: "Wholesale" },

            "Idukki Mountain Pharma": { location: "Idukki", phone: "+91 99012 34567", type: "Retail" },
            "Wayanad Green Pharmacy": { location: "Wayanad", phone: "+91 99567 89012", type: "Medical" },
            "Kasaragod Pharma World": { location: "Kasaragod", phone: "+91 98890 12345", type: "Wholesale" },
            "Kollam Medical Hub": { location: "Kollam", phone: "+91 99234 56789", type: "Distributor" }
        };

        function displayResults(distributors, medicineName) {
            const resultsDiv = document.getElementById('results');
            const countDiv = document.getElementById('count');
            
            countDiv.textContent = `${distributors.length} distributor${distributors.length !== 1 ? 's' : ''} found`;
            
            if (distributors.length === 0) {
                resultsDiv.innerHTML = '<div style="text-align:center;color:white;font-size:1.2em;">No distributors found. Try a different medicine name.</div>';
                return;
            }

            resultsDiv.innerHTML = distributors.map(d => {
                const details = distributorDetails[d];
                return `
                <div class="card">
                    <h3>${d}</h3>
                    <p>📍 ${details.location}</p>
                    <p>📞 <a href="tel:${details.phone}">${details.phone}</a></p>
                    <p>🏛️ Kerala</p>
                    <p>🏪 ${details.type}</p>
                    <p>💊 Stocks: <strong>${medicineName}</strong></p>
                    <span class="badge">Available</span>
                </div>
                `;
            }).join('');
        }

        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!query || query.length < 3) {
                document.getElementById('count').textContent = 'Type at least 3 letters to search';
                document.getElementById('results').innerHTML = '';
                return;
            }

            // Find medicines matching the query
            const matchingMedicines = medicineCatalog.filter(m => 
                m.name.toLowerCase().includes(query)
            );

            if (matchingMedicines.length === 0) {
                document.getElementById('count').textContent = 'No medicines found';
                document.getElementById('results').innerHTML = '<div style="text-align:center;color:white;font-size:1.2em;">No medicines found. Try different spelling.</div>';
                return;
            }

            // Get all unique distributors for matching medicines
            const allDistributors = new Set();
            matchingMedicines.forEach(m => {
                m.distributors.forEach(d => allDistributors.add(d));
            });

            // Show the first matching medicine name in results
            const medicineName = matchingMedicines[0].name;
            displayResults(Array.from(allDistributors), medicineName);
        }

        // Show instructions on load
        document.getElementById('count').textContent = 'Type a medicine name (min 3 letters) and click Search';

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
