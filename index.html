    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #4F46E5; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.1em; }
        .search-box { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .search-input { 
            width: 100%; 
            padding: 15px; 
            font-size: 1.1em; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .search-input:focus { outline: none; border-color: #4F46E5; }
        .btn { 
            background: #4F46E5; 
            color: white; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 10px;
            font-size: 1.1em; 
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #3730a3; }
        .district-select {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 15px;
            background: white;
        }
        .district-select:focus { outline: none; border-color: #4F46E5; }
        .filter-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .filter-row .search-input { flex: 2; min-width: 200px; margin-bottom: 0; }
        .filter-row .district-select { flex: 1; min-width: 150px; margin-bottom: 0; }
        .featured-badge {
            background: #FF6B35;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 8px;
        }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { color: #1a1a1a; margin-bottom: 15px; font-size: 1.3em; }
        .card p { color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .card a { color: #4F46E5; text-decoration: none; }
        .card a:hover { text-decoration: underline; }
        .badge { 
            display: inline-block; 
            background: #4F46E5; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 20px;
            font-size: 0.85em; 
            margin-top: 15px;
        }
        .footer { 
            text-align: center; 
            color: white; 
            padding: 40px; 
            margin-top: 50px;
            opacity: 0.9;
        }
        .hidden { display: none; }
        #count { color: #666; margin-top: 15px; }
    </style>

        function displayResults(distributors, medicineName) {
            const resultsDiv = document.getElementById('results');
            const countDiv = document.getElementById('count');
            const district = document.getElementById('districtSelect').value;
            
            countDiv.textContent = `${distributors.length} distributor${distributors.length !== 1 ? 's' : ''} found` + (district ? ` in ${district}` : '');
            
            if (distributors.length === 0) {
                resultsDiv.innerHTML = '<div style="text-align:center;color:white;font-size:1.2em;">No distributors found. Try a different medicine name or district.</div>';
                return;
            }

            // Sort: featured first, then by name
            distributors.sort((a, b) => {
                const aFeatured = distributorDetails[a]?.featured ? 1 : 0;
                const bFeatured = distributorDetails[b]?.featured ? 1 : 0;
                return bFeatured - aFeatured || a.localeCompare(b);
            });

            resultsDiv.innerHTML = distributors.map(d => {
                const details = distributorDetails[d];
                const featuredBadge = details.featured ? '<span class="featured-badge">TOP DISTRIBUTOR</span>' : '';
                return `
                <div class="card">
                    <h3>${d} ${featuredBadge}</h3>
                    <p>📍 ${details.location}</p>
                    <p>📞 <a href="tel:${details.phone}">${details.phone}</a></p>
                    <p>🏛️ Kerala</p>
                    <p>🏪 ${details.type}</p>
                    <p>💊 Stocks: <strong>${medicineName}</strong></p>
                    <span class="badge">Available</span>
                </div>
                `;
            }).join('');
        }

        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const district = document.getElementById('districtSelect').value;
            
            if (!query || query.length < 2) {
                document.getElementById('count').textContent = 'Type at least 2 letters to search';
                document.getElementById('results').innerHTML = '';
                return;
            }

            const matchingMedicines = medicineCatalog.filter(m => 
                m.name.toLowerCase().includes(query)
            );

            if (matchingMedicines.length === 0) {
                document.getElementById('count').textContent = 'No medicines found';
                document.getElementById('results').innerHTML = '<div style="text-align:center;color:white;font-size:1.2em;">No medicines found. Try different spelling.</div>';
                return;
            }

            // Get all unique distributors for matching medicines
            let allDistributors = new Set();
            matchingMedicines.forEach(m => {
                m.distributors.forEach(d => allDistributors.add(d));
            });

            // Filter by district if selected
            let distributorList = Array.from(allDistributors);
            if (district) {
                distributorList = distributorList.filter(d => {
                    const details = distributorDetails[d];
                    return details && details.location === district;
                });
            }

            // Show the first matching medicine name in results
            const medicineName = matchingMedicines[0].name;
            displayResults(distributorList, medicineName);
        }

        // Show Thrissur featured distributors on load
        function showThrissurFeatured() {
            const thrissurDistributors = Object.keys(distributorDetails).filter(d => 
                distributorDetails[d].location === 'Thrissur'
            );
            displayResults(thrissurDistributors, 'All Medicines');
            document.getElementById('count').textContent = `${thrissurDistributors.length} major distributors in Thrissur`;
        }

        // Load Thrissur on startup
        showThrissurFeatured();

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
